<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Simple SRMT - Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 150px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 6px;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b6d7ff;
        }

        .response {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f1f3f4;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #666;
        }

        #loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-radius: 50%;
            border-top: 4px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Interface Simple SRMT</h1>
            <p>Version Test - Vérification des Boutons</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="queryInput">Tapez votre question:</label>
                <textarea id="queryInput" placeholder="Exemple: Analyse des ventes par région..."></textarea>
            </div>

            <div class="buttons">
                <button id="btnSubmit" class="btn">📤 Envoyer</button>
                <button id="btnClear" class="btn btn-secondary">🗑️ Effacer</button>
                <button id="btnTest" class="btn btn-success">✅ Test API</button>
            </div>

            <div id="status" class="status" style="display:none;"></div>
            
            <div id="loading">
                <div class="spinner"></div>
                <p>Traitement en cours...</p>
            </div>

            <div id="response" class="response" style="display:none;"></div>

            <div id="debugInfo" class="debug-info"></div>
        </div>
    </div>

    <script>
        // Variables globales
        let debugMode = true;
        let eventCount = 0;

        // Fonction de debug
        function logDebug(message) {
            const timestamp = new Date().toLocaleTimeString();
            const debugDiv = document.getElementById('debugInfo');
            const logEntry = `[${timestamp}] ${message}\n`;
            debugDiv.textContent += logEntry;
            console.log(message);
        }

        // Fonction pour afficher le statut
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            
            logDebug(`Status: ${type.toUpperCase()} - ${message}`);
        }

        // Fonction pour afficher/masquer le loading
        function toggleLoading(show) {
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = show ? 'block' : 'none';
        }

        // Fonction pour afficher la réponse
        function showResponse(data) {
            const responseDiv = document.getElementById('response');
            
            if (typeof data === 'object') {
                responseDiv.innerHTML = `
                    <h3>Réponse API:</h3>
                    <p><strong>Status:</strong> ${data.status}</p>
                    <p><strong>Message:</strong> ${data.message}</p>
                    ${data.timestamp ? `<p><strong>Timestamp:</strong> ${data.timestamp}</p>` : ''}
                    ${data.data ? `<p><strong>Données:</strong> ${JSON.stringify(data.data, null, 2)}</p>` : ''}
                `;
            } else {
                responseDiv.innerHTML = `<p>${data}</p>`;
            }
            
            responseDiv.style.display = 'block';
        }

        // Fonction pour envoyer la requête
        async function sendQuery() {
            eventCount++;
            const query = document.getElementById('queryInput').value.trim();
            
            logDebug(`Event ${eventCount}: sendQuery() appelé avec query: "${query}"`);
            
            if (!query) {
                showStatus('Veuillez saisir une question', 'error');
                return;
            }

            try {
                toggleLoading(true);
                showStatus('Envoi de la requête...', 'info');
                
                logDebug('Envoi de la requête POST à /test_api');
                
                const response = await fetch('/test_api', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: query })
                });

                logDebug(`Réponse reçue avec status: ${response.status}`);
                
                if (response.ok) {
                    const data = await response.json();
                    logDebug('Données JSON reçues avec succès');
                    showStatus('Requête traitée avec succès!', 'success');
                    showResponse(data);
                } else {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
            } catch (error) {
                logDebug(`Erreur: ${error.message}`);
                showStatus(`Erreur: ${error.message}`, 'error');
                showResponse(`Erreur de communication: ${error.message}`);
            } finally {
                toggleLoading(false);
            }
        }

        // Fonction pour effacer
        function clearQuery() {
            eventCount++;
            logDebug(`Event ${eventCount}: clearQuery() appelé`);
            
            document.getElementById('queryInput').value = '';
            document.getElementById('status').style.display = 'none';
            document.getElementById('response').style.display = 'none';
            
            showStatus('Champs effacés', 'success');
            
            setTimeout(() => {
                document.getElementById('status').style.display = 'none';
            }, 2000);
        }

        // Fonction pour tester l'API
        async function testAPI() {
            eventCount++;
            logDebug(`Event ${eventCount}: testAPI() appelé`);
            
            // Test avec une requête prédéfinie
            document.getElementById('queryInput').value = 'Test de l\'API - ' + new Date().toLocaleString();
            await sendQuery();
        }

        // Initialisation au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            logDebug('=== INITIALISATION DE L\'INTERFACE ===');
            logDebug('DOM chargé, initialisation des événements...');
            
            // Récupération des éléments
            const btnSubmit = document.getElementById('btnSubmit');
            const btnClear = document.getElementById('btnClear');
            const btnTest = document.getElementById('btnTest');
            const queryInput = document.getElementById('queryInput');

            // Vérification des éléments
            if (!btnSubmit) logDebug('ERREUR: btnSubmit non trouvé');
            if (!btnClear) logDebug('ERREUR: btnClear non trouvé');
            if (!btnTest) logDebug('ERREUR: btnTest non trouvé');
            if (!queryInput) logDebug('ERREUR: queryInput non trouvé');

            // Ajout des événements
            if (btnSubmit) {
                btnSubmit.addEventListener('click', function(e) {
                    e.preventDefault();
                    logDebug('CLICK détecté sur btnSubmit');
                    sendQuery();
                });
                logDebug('Event listener ajouté pour btnSubmit');
            }

            if (btnClear) {
                btnClear.addEventListener('click', function(e) {
                    e.preventDefault();
                    logDebug('CLICK détecté sur btnClear');
                    clearQuery();
                });
                logDebug('Event listener ajouté pour btnClear');
            }

            if (btnTest) {
                btnTest.addEventListener('click', function(e) {
                    e.preventDefault();
                    logDebug('CLICK détecté sur btnTest');
                    testAPI();
                });
                logDebug('Event listener ajouté pour btnTest');
            }

            // Événement Enter sur le textarea
            if (queryInput) {
                queryInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && e.ctrlKey) {
                        e.preventDefault();
                        logDebug('CTRL+ENTER détecté dans queryInput');
                        sendQuery();
                    }
                });
                logDebug('Event listener ajouté pour queryInput (Ctrl+Enter)');
            }

            logDebug('=== INITIALISATION TERMINÉE ===');
            showStatus('Interface prête - Cliquez sur un bouton pour tester', 'success');

            // Auto-test après 2 secondes
            setTimeout(() => {
                logDebug('Auto-test: vérification que les boutons réagissent au survol');
                showStatus('Interface active - Testez les boutons!', 'info');
            }, 2000);
        });

        // Test de survol des boutons
        document.addEventListener('mouseover', function(e) {
            if (e.target.classList.contains('btn')) {
                logDebug(`Survol détecté sur: ${e.target.textContent}`);
            }
        });

        // Test global des clics
        document.addEventListener('click', function(e) {
            logDebug(`CLICK global détecté sur: ${e.target.tagName} - ${e.target.id || e.target.className}`);
        });
    </script>
</body>
</html>
