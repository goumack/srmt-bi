apiVersion: v1
kind: Secret
metadata:
  name: srmt-bi-secrets
  labels:
    app: srmt-bi
type: Opaque
stringData:
  NVIDIA_API_KEY: "CHANGE_ME"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: srmt-bi
  labels:
    app: srmt-bi
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: srmt-bi
  labels:
    app: srmt-bi
spec:
  runPolicy: Serial
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: srmt-bi:latest
  triggers:
    - type: ConfigChange
---
apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: srmt-bi
  labels:
    app: srmt-bi
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    app: srmt-bi
    deploymentconfig: srmt-bi
  strategy:
    type: Rolling
    rollingParams:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: srmt-bi
        deploymentconfig: srmt-bi
    spec:
      containers:
        - name: srmt-bi
          image: ""
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PRODUCTION
              value: "true"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: REQUEST_TIMEOUT
              value: "120"
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: srmt-bi-secrets
                  key: NVIDIA_API_KEY
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 6Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: cache-dir
              mountPath: /app/cache
            - name: logs-dir
              mountPath: /app/logs
      volumes:
        - name: cache-dir
          emptyDir: {}
        - name: logs-dir
          emptyDir: {}
  triggers:
    - type: ConfigChange
    - type: ImageChange
      imageChangeParams:
        automatic: true
        containerNames:
          - srmt-bi
        from:
          kind: ImageStreamTag
          name: srmt-bi:latest
---
apiVersion: v1
kind: Service
metadata:
  name: srmt-bi
  labels:
    app: srmt-bi
spec:
  selector:
    app: srmt-bi
    deploymentconfig: srmt-bi
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: srmt-bi
  labels:
    app: srmt-bi
spec:
  to:
    kind: Service
    name: srmt-bi
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
